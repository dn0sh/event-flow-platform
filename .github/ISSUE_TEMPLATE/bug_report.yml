name: Bug Report
description: Сообщить о баге в production-ready платформе.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Описание проблемы
      description: Кратко опишите наблюдаемое поведение.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Нумерованный список шагов для воспроизведения.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Версия
      placeholder: "например, 1.0.0"
  - type: textarea
    id: logs
    attributes:
      label: Логи/скриншоты
      render: shell
