name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.STAGING_APP_PATH }}
            git fetch --all
            git checkout main
            git pull origin main
            docker compose -f docker/docker-compose.yml pull
            docker compose -f docker/docker-compose.yml up -d --build
      - name: Health check staging
        id: healthcheck
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            for i in {1..12}; do
              if curl -fsS http://localhost:8060/health > /dev/null; then
                echo "health=ok" >> $GITHUB_OUTPUT
                exit 0
              fi
              sleep 5
            done
            exit 1
      - name: Rollback on failed health check
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.STAGING_APP_PATH }}
            git reset --hard HEAD~1
            docker compose -f docker/docker-compose.yml up -d --build
      - name: Telegram notify success
        if: success()
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}" \
            -d text="✅ Staging deploy successful for ${{ github.repository }}@${{ github.sha }}"
      - name: Telegram notify failure
        if: failure()
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}" \
            -d text="❌ Staging deploy failed for ${{ github.repository }}@${{ github.sha }}"
