# Подстановка ${RABBITMQ_*}: запускайте из корня репозитория с
# docker compose --env-file .env -f docker/docker-compose.yml ...
name: eventflow

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env
    ports:
      - "8060:8060"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8060/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    # Должно совпадать с POSTGRES_* в .env (api, alembic, воркеры). Иначе: password authentication failed.
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-event_system}
      POSTGRES_USER: ${POSTGRES_USER:-event_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-event_password}
    ports:
      - "8061:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-event_user} -d ${POSTGRES_DB:-event_system}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "8062:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "8063:5672"
      - "8064:15672"
    env_file:
      - ../.env
    environment:
      # Создаёт пользователя с доступом из сети Docker (не только localhost). Должно совпадать с RABBITMQ_* в .env приложений.
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-eventflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-eventflow_dev}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - rabbitmq-diagnostics -q ping && timeout 3 bash -c 'exec 3<>/dev/tcp/127.0.0.1/5672'
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "8065:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:8065
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      - kafka
    ports:
      - "8066:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "8067:4222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "8068:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "8069:3000"
    depends_on:
      - prometheus

  bot:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    env_file:
      - ../.env
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; assert os.getenv('TELEGRAM_BOT_TOKEN')\""]
      interval: 20s
      timeout: 5s
      retries: 3

  worker-email:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["python", "-m", "src.workers.email_worker"]
    env_file:
      - ../.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/', timeout=5)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 3

  worker-telegram:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["python", "-m", "src.workers.telegram_worker"]
    env_file:
      - ../.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/', timeout=5)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 3

  worker-analytics:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["python", "-m", "src.workers.analytics_worker"]
    env_file:
      - ../.env
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8094/', timeout=5)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 3

  worker-logger:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["python", "-m", "src.workers.logger_worker"]
    env_file:
      - ../.env
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8093/', timeout=5)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  rabbitmq_data:
